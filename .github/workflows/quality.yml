name: Quality

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: ci-only-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      DEMO_MODE: "False"
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check .
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test

  backend-postgresql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tenderhelper
          POSTGRES_USER: tenderhelper
          POSTGRES_PASSWORD: tenderhelper-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenderhelper -d tenderhelper"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://tenderhelper:tenderhelper-ci@127.0.0.1:5432/tenderhelper
      SECRET_KEY: ci-only-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      DEMO_MODE: "False"
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python manage.py migrate --noinput
      - run: python manage.py check
      - run: python manage.py check --deploy
        env:
          APP_ENV: production
          DEBUG: "False"
          CELERY_TASK_ALWAYS_EAGER: "False"
          SECRET_KEY: production-ci-check-only-secret-key-abcdefghijklmnopqrstuvwxyz-1234567890
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
          SECURE_HSTS_PRELOAD: "True"
      - run: python manage.py test
      - run: python manage.py seed_tender_search_benchmark --count 100000 --reset
      - run: >-
          python manage.py benchmark_tender_search
          --query "specialized server"
          --iterations 20
          --warmup 3
          --minimum-dataset-size 100000
          --assert-p95-ms 300
          --explain

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
